name: Deploy

# Reusable deployment workflow.
# Smoke-test stage: proves the GitHub Environment gate (pause → approve → run),
# deploys nothing real yet. See specs/CI-DEPLOYMENT.md.

on:
  # Called by ci.yml after a build (in-run gate).
  workflow_call:
    inputs:
      environment:
        description: Target environment
        type: string
        required: true
  # Standalone trigger for smoke-testing the gate from the Actions tab.
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        default: development
        options:
          - development

jobs:
  prepare:
    name: Prepare artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build (placeholder)
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: echo "Artifacts ready for '$ENVIRONMENT'"

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: prepare
    environment: ${{ inputs.environment }}
    steps:
      - name: Hello
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: echo "Hello from the '$ENVIRONMENT' deployment 👋"
