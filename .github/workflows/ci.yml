name: CI

#
# Main CI/CD pipeline – GitHub Actions port of .gitlab-ci.yml
#
# Trigger rules (mirror GitLab workflow: rules):
#   - Push to main or release/** branches
#   - Pull requests targeting main or release/**
#   - Manual dispatch (with optional version_name override)
#   - Triggered by other workflows (workflow_call)
#
on:
  push:
    branches:
      - main
      - 'release/**'
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Override version name (e.g. 25.12.3)'
        required: false
        default: ''

# Cancel in-progress runs for the same branch/PR (replaces GitLab duplicate-pipeline rule)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_HOME: '/opt/android-sdk'
  GRADLE_CACHE_DIR: "${{ github.workspace }}/gradle-cache"
  GRADLE_USER_HOME: "${{ github.workspace }}/.gradle"
  BUILD_BASE_NUMBER: "170"
  ARTIFACT_NAME: "RestoGO"
  SCRIPTS_DIR: "./ci-scripts"
  RELEASE_NOTES_FILE: "release-notes.md"
  # ANDROID_NODE_IMAGE must be set as a GitHub Actions Repository Variable:
  # Settings → Secrets and variables → Actions → Variables → ANDROID_NODE_IMAGE
  # Example: ghcr.io/${{ github.repository_owner }}/restogo-dev-docker:latest
  # (env context is not available in container.image; use vars context instead)

# ─────────────────────────────────────────────────────────────────────────────
# 1. PREPARE
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ---------------------------------------------------------------------------
  # prepare-version  (≈ GitLab prepare-version + install-deps prepare stage)
  # ---------------------------------------------------------------------------
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    environment: common
    outputs:
      build_number: ${{ steps.version.outputs.BUILD_NUMBER }}
      version:      ${{ steps.version.outputs.VERSION }}
      tag:          ${{ steps.version.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need full history for version.sh git tag lookups      
      - name: Calculate version
        id: version
        run: |
          BUILD_NUMBER=$(( GITHUB_RUN_NUMBER + BUILD_BASE_NUMBER ))
          VERSION="0.0.${BUILD_NUMBER}"   # sandbox placeholder (real ci uses VERSION_NAME)
          TAG="v${VERSION}"
          {
            echo "BUILD_NUMBER=${BUILD_NUMBER}"
            echo "VERSION=${VERSION}"
            echo "TAG=${TAG}"
          } >> "$GITHUB_OUTPUT"
          echo "Build ${BUILD_NUMBER} → ${TAG}"

  # ---------------------------------------------------------------------------
  # jira-release-notes  (≈ GitLab jira-release-notes)
  # ---------------------------------------------------------------------------
  jira-release-notes:
    name: Generate Jira release notes
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # build-docker-image  (Build custom node/android image)
  # ---------------------------------------------------------------------------
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # install-deps  (≈ GitLab install-deps)
  # ---------------------------------------------------------------------------
  install-deps:
    name: Install npm dependencies
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    container:
      image: node:24-alpine3.21
    steps:
      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 2. BUILD IONIC
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # build-ionic-debug  (≈ GitLab build-ionic-debug)
  # Runs: auto on main + PRs; manual dispatch on release/**
  # ---------------------------------------------------------------------------
  build-ionic-debug:
    name: Build Ionic (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
  # ---------------------------------------------------------------------------
  # build-ionic-release  (≈ GitLab build-ionic-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  build-ionic-release:
    name: Build Ionic (release)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 3. BUILD ANDROID
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # test-and-build-debug  (≈ GitLab test-and-build-debug)
  # ---------------------------------------------------------------------------
  test-and-build-debug:
    name: Android test + build (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-debug, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        !startsWith(github.ref_name, 'release/') ||
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

    

  # ---------------------------------------------------------------------------
  # test-and-build-release  (≈ GitLab test-and-build-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  test-and-build-release:
    name: Android test + build (release)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-release, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Dummy
        run: |
          echo "dummy"

# ─────────────────────────────────────────────────────────────────────────────
# 4. DEPLOY (gated)
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # deploy-development  — calls the reusable deploy.yml after the debug build
  # (button #1, in-run gate). The 'development' GitHub Environment pauses this
  # as "Review deployments" until a reviewer approves, then it runs and goes
  # green. Configure the environment + a required reviewer in
  # repo Settings → Environments.
  # ---------------------------------------------------------------------------
  deploy-development:
    name: Deploy (development)
    needs: [test-and-build-debug]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# 5. PUBLISH PER-BUILD RELEASE
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # package-artifacts  — placeholder build outputs (sandbox has no real APKs).
  # One file per variant, named with the build number, uploaded as a workflow
  # artifact for the release job to attach.
  # ---------------------------------------------------------------------------
  package-artifacts:
    name: Package artifacts (placeholder)
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - name: Generate placeholder variant files
        env:
          VERSION: ${{ needs.prepare-version.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare-version.outputs.build_number }}
        run: |
          mkdir -p dist
          BASE="RestoGO_${VERSION}"
          for v in dev pilot prod; do
            echo "placeholder ${v} debug apk — build ${BUILD_NUMBER}" > "dist/${BASE}-${v}-debug.apk"
          done
          echo "placeholder prod release aab — build ${BUILD_NUMBER}" > "dist/${BASE}-prod-release.aab"
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # publish-release  — durable per-build GitHub Release tagged by build number
  # (build_id), with all variant artifacts attached. This is the store the
  # promotion workflow (button #2) will resolve a build from.
  # Re-runnable: updates assets if the release already exists.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish per-build Release
    runs-on: ubuntu-latest
    needs: [prepare-version, package-artifacts]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist
      - name: Create or update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare-version.outputs.tag }}
          BUILD_NUMBER: ${{ needs.prepare-version.outputs.build_number }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating assets"
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Creating per-build Release $TAG"
            gh release create "$TAG" \
              --title "Build $BUILD_NUMBER" \
              --notes "Per-build artifacts for build $BUILD_NUMBER." \
              dist/*
          fi

