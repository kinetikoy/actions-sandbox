name: CI

#
# Main CI/CD pipeline – GitHub Actions port of .gitlab-ci.yml
#
# Trigger rules (mirror GitLab workflow: rules):
#   - Push to main or release/** branches
#   - Pull requests targeting main or release/**
#   - Manual dispatch (with optional version_name override)
#   - Triggered by other workflows (workflow_call)
#
on:
  push:
    branches:
      - main
      - 'release/**'
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Override version name (e.g. 25.12.3)'
        required: false
        default: ''

# Cancel in-progress runs for the same branch/PR (replaces GitLab duplicate-pipeline rule)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_HOME: '/opt/android-sdk'
  GRADLE_CACHE_DIR: "${{ github.workspace }}/gradle-cache"
  GRADLE_USER_HOME: "${{ github.workspace }}/.gradle"
  BUILD_BASE_NUMBER: "170"
  ARTIFACT_NAME: "RestoGO"
  SCRIPTS_DIR: "./ci-scripts"
  RELEASE_NOTES_FILE: "release-notes.md"
  # ANDROID_NODE_IMAGE must be set as a GitHub Actions Repository Variable:
  # Settings → Secrets and variables → Actions → Variables → ANDROID_NODE_IMAGE
  # Example: ghcr.io/${{ github.repository_owner }}/restogo-dev-docker:latest
  # (env context is not available in container.image; use vars context instead)

# ─────────────────────────────────────────────────────────────────────────────
# 1. PREPARE
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ---------------------------------------------------------------------------
  # prepare-version  (≈ GitLab prepare-version + install-deps prepare stage)
  # ---------------------------------------------------------------------------
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need full history for version.sh git tag lookups      
      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # jira-release-notes  (≈ GitLab jira-release-notes)
  # ---------------------------------------------------------------------------
  jira-release-notes:
    name: Generate Jira release notes
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # build-docker-image  (Build custom node/android image)
  # ---------------------------------------------------------------------------
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # install-deps  (≈ GitLab install-deps)
  # ---------------------------------------------------------------------------
  install-deps:
    name: Install npm dependencies
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    container:
      image: node:24-alpine3.21
    steps:
      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 2. BUILD IONIC
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # build-ionic-debug  (≈ GitLab build-ionic-debug)
  # Runs: auto on main + PRs; manual dispatch on release/**
  # ---------------------------------------------------------------------------
  build-ionic-debug:
    name: Build Ionic (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
  # ---------------------------------------------------------------------------
  # build-ionic-release  (≈ GitLab build-ionic-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  build-ionic-release:
    name: Build Ionic (release)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 3. BUILD ANDROID
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # test-and-build-debug  (≈ GitLab test-and-build-debug)
  # ---------------------------------------------------------------------------
  test-and-build-debug:
    name: Android test + build (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-debug, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        !startsWith(github.ref_name, 'release/') ||
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

    

  # ---------------------------------------------------------------------------
  # test-and-build-release  (≈ GitLab test-and-build-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  test-and-build-release:
    name: Android test + build (release)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-release, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    container:
      image: ${{ vars.ANDROID_NODE_IMAGE || format('ghcr.io/{0}/restogo-android-node:latest', needs.prepare-version.outputs.owner_lc) }}
      options: --init
    steps:
      - uses: actions/checkout@v4

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            .gradle/caches/
            .gradle/wrapper/
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle') }}

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules/
          key: node-${{ hashFiles('package-lock.json') }}

      - name: Download install artifacts
        uses: actions/download-artifact@v4
        with:
          name: install-deps-artifacts
          path: .

      - name: Extract node_modules
        run: tar -xzf node_modules.tar.gz

      - name: Download ionic release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ionic-release-artifacts

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 || secrets.NETS_KEYSTORE_BASE64 }}" | base64 -d > nets_keystore

      - name: Decode sentry.properties
        run: echo "${{ secrets.SENTRY_PROPERTIES_BASE64 }}" | base64 -d > android/sentry.properties

      - name: Gradle lint + test + assemble (release)
        env:
          VERSION_NAME: ${{ needs.prepare-version.outputs.version_name }}
          BUILD_NUMBER: ${{ needs.prepare-version.outputs.build_number }}
          RELEASE_STORE_FILE: "../nets_keystore"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew --parallel --build-cache \
            -PappVersionName="$VERSION_NAME" \
            -PappBuildNumber="$BUILD_NUMBER" \
            -PciReleaseBuild=true \
            app:lintProdRelease app:testProdRelease \
            app:assemblePilotRelease app:assembleProdRelease app:bundleProdRelease

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: android/app/build/outputs
          retention-days: 7

      - name: Upload test + lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-reports
          path: |
            android/app/build/test-results/testProdRelease*/TEST-*.xml
            android/app/build/reports/lint-results-prodRelease.xml
          retention-days: 7


