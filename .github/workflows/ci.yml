name: CI

#
# Main CI/CD pipeline – GitHub Actions port of .gitlab-ci.yml
#
# Trigger rules (mirror GitLab workflow: rules):
#   - Push to main or release/** branches
#   - Pull requests targeting main or release/**
#   - Manual dispatch (with optional version_name override)
#   - Triggered by other workflows (workflow_call)
#
on:
  push:
    branches:
      - main
      - 'release/**'
      - '**'
  pull_request:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Override version name (e.g. 25.12.3)'
        required: false
        default: ''

# Cancel in-progress runs for the same branch/PR (replaces GitLab duplicate-pipeline rule)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_HOME: '/opt/android-sdk'
  GRADLE_CACHE_DIR: "${{ github.workspace }}/gradle-cache"
  GRADLE_USER_HOME: "${{ github.workspace }}/.gradle"
  RG_BUILD_BASE: "170"
  ARTIFACT_NAME: "RestoGO"
  SCRIPTS_DIR: "./ci-scripts"
  RELEASE_NOTES_FILE: "release-notes.md"
  # ANDROID_NODE_IMAGE must be set as a GitHub Actions Repository Variable:
  # Settings → Secrets and variables → Actions → Variables → ANDROID_NODE_IMAGE
  # Example: ghcr.io/${{ github.repository_owner }}/restogo-dev-docker:latest
  # (env context is not available in container.image; use vars context instead)

# ─────────────────────────────────────────────────────────────────────────────
# 1. PREPARE
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ---------------------------------------------------------------------------
  # prepare-version  (≈ GitLab prepare-version + install-deps prepare stage)
  # ---------------------------------------------------------------------------
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    environment: common
    outputs:
      build_number:   ${{ steps.version.outputs.BUILD_NUMBER }}
      version_name:   ${{ steps.version.outputs.VERSION_NAME }}
      full_version:   ${{ steps.version.outputs.FULL_VERSION }}
      tag_name:       ${{ steps.version.outputs.TAG_NAME }}
      release_tag:    ${{ steps.version.outputs.RELEASE_TAG }}
      release_branch: ${{ steps.version.outputs.RELEASE_BRANCH }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate version
        id: version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA:      ${{ github.sha }}
        run: |
          set -e
          chmod +x "$SCRIPTS_DIR/version-gh2.sh"
          BUILD_NUMBER=$(( GITHUB_RUN_NUMBER + RG_BUILD_BASE ))
          REF="$GITHUB_REF_NAME"

          if [ "$REF" = "main" ]; then
            "$SCRIPTS_DIR/version-gh2.sh" "next-release" "$BUILD_NUMBER" > version.env
          elif echo "$REF" | grep -qE '^release/'; then
            "$SCRIPTS_DIR/version-gh2.sh" "next-patch" "$BUILD_NUMBER" > version.env
          else
            REF_SLUG=$(echo "$REF" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            "$SCRIPTS_DIR/version-gh2.sh" "next-release" "$BUILD_NUMBER" "$REF_SLUG" > version.env
          fi

          cat version.env
          while IFS='=' read -r key value; do
            [ -n "$key" ] && echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < version.env

          # Surface version info on the run summary page
          . ./version.env
          {
            echo "## Build ${BUILD_NUMBER}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Build number | \`${BUILD_NUMBER}\` |"
            echo "| Version | \`${VERSION_NAME}\` |"
            echo "| Release tag | \`${RELEASE_TAG}\` |"
            echo "| Release branch | \`${RELEASE_BRANCH}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # jira-release-notes  (≈ GitLab jira-release-notes)
  # ---------------------------------------------------------------------------
  jira-release-notes:
    name: Generate Jira release notes
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # build-docker-image  (Build custom node/android image)
  # ---------------------------------------------------------------------------
  build-docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dummy
        run: |
          echo "dummy"

  # ---------------------------------------------------------------------------
  # install-deps  (≈ GitLab install-deps)
  # ---------------------------------------------------------------------------
  install-deps:
    name: Install npm dependencies
    runs-on: ubuntu-latest
    needs: prepare-version
    environment: common
    container:
      image: node:24-alpine3.21
    steps:
      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 2. BUILD IONIC
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # build-ionic-debug  (≈ GitLab build-ionic-debug)
  # Runs: auto on main + PRs; manual dispatch on release/**
  # ---------------------------------------------------------------------------
  build-ionic-debug:
    name: Build Ionic (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
  # ---------------------------------------------------------------------------
  # build-ionic-release  (≈ GitLab build-ionic-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  build-ionic-release:
    name: Build Ionic (release)
    runs-on: ubuntu-latest
    needs: [install-deps, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Dummy
        run: |
          echo "dummy"
      
# ─────────────────────────────────────────────────────────────────────────────
# 3. BUILD ANDROID
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # test-and-build-debug  (≈ GitLab test-and-build-debug)
  # ---------------------------------------------------------------------------
  test-and-build-debug:
    name: Android test + build (debug)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-debug, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        !startsWith(github.ref_name, 'release/') ||
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

    

  # ---------------------------------------------------------------------------
  # test-and-build-release  (≈ GitLab test-and-build-release)
  # Runs: auto on release/**; manual on main/other
  # ---------------------------------------------------------------------------
  test-and-build-release:
    name: Android test + build (release)
    runs-on: ubuntu-latest
    needs: [install-deps, build-ionic-release, prepare-version, build-docker-image]
    environment: common
    if: |
      (success() || (
        needs.prepare-version.result == 'success' &&
        needs.install-deps.result == 'success' &&
        needs.build-docker-image.result == 'skipped'
      )) &&
      (
        startsWith(github.ref_name, 'release/') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Dummy
        run: |
          echo "dummy"

# ─────────────────────────────────────────────────────────────────────────────
# 4. DEPLOY (gated)
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # deploy-development  — calls the reusable deploy.yml after the debug build
  # (button #1, in-run gate). The 'development' GitHub Environment pauses this
  # as "Review deployments" until a reviewer approves, then it runs and goes
  # green. Configure the environment + a required reviewer in
  # repo Settings → Environments.
  # ---------------------------------------------------------------------------
  deploy-development:
    name: Deploy (development)
    needs: [test-and-build-debug]
    uses: ./.github/workflows/deploy.yml
    with:
      environment: development
    secrets: inherit

# ─────────────────────────────────────────────────────────────────────────────
# 5. PUBLISH PER-BUILD RELEASE
# ─────────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # package-artifacts  — placeholder build outputs (sandbox has no real APKs).
  # One file per variant, named with the build number, uploaded as a workflow
  # artifact for the release job to attach.
  # ---------------------------------------------------------------------------
  package-artifacts:
    name: Package artifacts (placeholder)
    runs-on: ubuntu-latest
    needs: prepare-version
    steps:
      - name: Generate placeholder variant files
        env:
          FULL_VERSION: ${{ needs.prepare-version.outputs.full_version }}
          BUILD_NUMBER: ${{ needs.prepare-version.outputs.build_number }}
        run: |
          mkdir -p dist
          BASE="RestoGO_${FULL_VERSION}"
          for v in dev pilot prod; do
            echo "placeholder ${v} debug apk — build ${BUILD_NUMBER}" > "dist/${BASE}-${v}-debug.apk"
          done
          echo "placeholder prod release aab — build ${BUILD_NUMBER}" > "dist/${BASE}-prod-release.aab"
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # publish-release  — durable per-build GitHub Release tagged by build number
  # (build_id), with all variant artifacts attached. This is the store the
  # promotion workflow (button #2) will resolve a build from.
  # Re-runnable: updates assets if the release already exists.
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish per-build Release
    runs-on: ubuntu-latest
    needs: [prepare-version, package-artifacts]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Generate build metadata
        env:
          BUILD_NUMBER:   ${{ needs.prepare-version.outputs.build_number }}
          FULL_VERSION:   ${{ needs.prepare-version.outputs.full_version }}
          VERSION_NAME:   ${{ needs.prepare-version.outputs.version_name }}
          TAG_NAME:       ${{ needs.prepare-version.outputs.tag_name }}
          RELEASE_TAG:    ${{ needs.prepare-version.outputs.release_tag }}
          RELEASE_BRANCH: ${{ needs.prepare-version.outputs.release_branch }}
          SHA:            ${{ github.sha }}
          REF:            ${{ github.ref_name }}
        run: |
          jq -n \
            --arg build_number   "$BUILD_NUMBER" \
            --arg full_version   "$FULL_VERSION" \
            --arg version_name   "$VERSION_NAME" \
            --arg tag_name       "$TAG_NAME" \
            --arg release_tag    "$RELEASE_TAG" \
            --arg release_branch "$RELEASE_BRANCH" \
            --arg sha            "$SHA" \
            --arg ref            "$REF" \
            --arg timestamp      "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{build_number:$build_number, full_version:$full_version, version_name:$version_name, tag_name:$tag_name, release_tag:$release_tag, release_branch:$release_branch, sha:$sha, ref:$ref, timestamp:$timestamp}' \
            > dist/build-metadata.json
          cat dist/build-metadata.json

      - name: Create or update Release
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:        ${{ github.repository }}
          RELEASE_TAG:    ${{ needs.prepare-version.outputs.release_tag }}
          BUILD_NUMBER:   ${{ needs.prepare-version.outputs.build_number }}
          FULL_VERSION:   ${{ needs.prepare-version.outputs.full_version }}
          REF:            ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG exists — updating assets"
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            echo "Creating pre-release $RELEASE_TAG for build $BUILD_NUMBER"
            gh release create "$RELEASE_TAG" \
              --title "Build $BUILD_NUMBER ($FULL_VERSION)" \
              --notes "Build $BUILD_NUMBER from \`$REF\`. Pre-release until promoted to production." \
              --prerelease \
              dist/*
          fi

